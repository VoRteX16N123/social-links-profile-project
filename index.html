<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>
</head>

<body>

  <main>
    <article class="profile">
      <div class="profile__content">
        <div class="profile__info">

          <img src="assets/images/avatar-jessica.jpeg" alt="This is the profile picture of Jessica Randall" srcset="">

          <h1 class="profile__person">Jessica Randall</h1>

          <p class="profile__location">London, United Kingdom</p>

          <p class="profile__description">"Front-end developer and avid reader."</p>
        </div>



        <div class="profile__buttons">
          <button class="button" type="button">GitHub</button>

          <button class="button" type="button">Frontend Mentor</button>

          <button class="button" type="button">LinkedIn</button>

          <button class="button" type="button">Twitter</button>

          <button class="button" type="button">Instagram</button>
        </div>
      </div>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/VoRteX16N123">George Kiriakidis</a>.
  </footer>

</body>

</html>
